syntax = "proto3";

package q1.internal.v1;

option java_package         = "io.q1.grpc";
option java_multiple_files  = true;
option java_outer_classname = "Q1InternalProto";

// ── Shard service ─────────────────────────────────────────────────────────────
//
// EC shard fan-out between cluster nodes.
// Replaces the HTTP /internal/v1/shard/... endpoint for inter-node calls.

service ShardService {
  rpc PutShard    (PutShardRequest)    returns (PutShardResponse);
  rpc GetShard    (GetShardRequest)    returns (GetShardResponse);
  rpc HeadShard   (HeadShardRequest)   returns (HeadShardResponse);
  rpc DeleteShard (DeleteShardRequest) returns (DeleteShardResponse);
}

message PutShardRequest {
  string bucket      = 1;
  string key         = 2;
  int32  shard_index = 3;
  bytes  payload     = 4;  // 8-byte originalSize header + raw Reed-Solomon shard data
}

message PutShardResponse {}

message GetShardRequest {
  string bucket      = 1;
  string key         = 2;
  int32  shard_index = 3;
}

message GetShardResponse {
  bool  found   = 1;
  bytes payload = 2;  // populated only when found == true
}

message HeadShardRequest {
  string bucket      = 1;
  string key         = 2;
  int32  shard_index = 3;
}

message HeadShardResponse {
  bool exists = 1;
}

message DeleteShardRequest {
  string bucket      = 1;
  string key         = 2;
  int32  shard_index = 3;
}

message DeleteShardResponse {}


// ── Admin service ─────────────────────────────────────────────────────────────
//
// Node health and metadata.  Used by the future admin CLI.

service AdminService {
  rpc GetHealth      (HealthRequest)      returns (HealthResponse);
  rpc GetNodeInfo    (NodeInfoRequest)    returns (NodeInfoResponse);
  rpc ListPartitions (ListPartitionsRequest) returns (ListPartitionsResponse);
}

message HealthRequest {}

message HealthResponse {
  enum Status {
    UNKNOWN  = 0;
    HEALTHY  = 1;
    DEGRADED = 2;
  }
  Status status    = 1;
  string node_id   = 2;
  bool   is_leader = 3;
}

message NodeInfoRequest {}

message NodeInfoResponse {
  string node_id        = 1;
  string host           = 2;
  int32  http_port      = 3;
  int32  raft_port      = 4;
  int32  grpc_port      = 5;
  bool   is_leader      = 6;
  int32  num_partitions = 7;
}

// ── ListPartitions ────────────────────────────────────────────────────────────

message ListPartitionsRequest {}

// Per-partition storage metrics as seen by this node.
message PartitionInfo {
  int32 partition_id     = 1;
  int32 segment_count    = 2;
  int64 total_size_bytes = 3;  // sum of all segment file sizes
  int64 live_key_count   = 4;  // approximate (RocksDB estimate)
}

// One configured cluster peer.
message PeerInfo {
  string node_id   = 1;
  string host      = 2;
  int32  http_port = 3;
  int32  grpc_port = 4;
  bool   is_self   = 5;  // true on the node that received this request
  bool   is_leader = 6;
}

message ListPartitionsResponse {
  enum ClusterStatus {
    CLUSTER_UNKNOWN          = 0;
    CLUSTER_HEALTHY          = 1;  // leader elected, quorum operational
    CLUSTER_DEGRADED         = 2;  // no leader or insufficient nodes for EC
  }
  ClusterStatus          cluster_status = 1;
  string                 leader_id      = 2;  // empty when unknown
  repeated PeerInfo      peers          = 3;
  repeated PartitionInfo partitions     = 4;
}
