---
# SSH user (must have sudo access)
ansible_user: root

# Q1 application
q1_version: "0.1.0-SNAPSHOT"
q1_jar_local: "{{ playbook_dir }}/../q1-api/target/q1-api-{{ q1_version }}.jar"
q1_port: 9000
q1_raft_port: 6000
q1_grpc_port: 7000
q1_data_dir: /q1/partitions

# Erasure coding (0 = disabled, replication mode)
q1_ec_k: 0   # data shards — 0 = plain Raft replication
q1_ec_m: 1   # parity shards (unused when q1_ec_k=0)

# EC repair scanner (unused when q1_ec_k=0)
q1_repair_interval_s: 60
q1_repair_batch_size: 200

# Number of storage partitions.
# With RF=N (every node replicates every partition) fewer partitions = fewer Raft groups =
# less direct memory at startup.  writeBufferSize (65 MB) is a DirectByteBuffer per group:
#   (q1_partitions + 1) × 65 MB must fit in the JVM direct memory budget.
#   4 partitions → 5 groups × 65 MB = 325 MB  ✓
#   16 partitions → 17 groups × 65 MB = 1.1 GB ✗  (exceeds ~980 MB limit on these nodes)
q1_partitions: 4

# Peer list — format: id:host:httpPort:raftPort:grpcPort per node, comma-separated
# Built from the inventory: each node in group [q1] contributes one entry.
q1_peers: >-
  {{ groups['q1']
     | map('regex_replace', '^(.*)$',
           '\1:' + (hostvars['\1']['ansible_host'] | default('\1'))
           + ':' + q1_port|string + ':' + q1_raft_port|string
           + ':' + q1_grpc_port|string)
     | join(',') }}
