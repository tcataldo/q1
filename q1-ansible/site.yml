---
# Full cluster deployment: etcd + q1
# Usage: ansible-playbook -i inventory.ini site.yml

- name: Install Java
  hosts: q1
  become: yes
  roles:
    - java

- name: Deploy etcd cluster
  hosts: etcd
  become: yes
  strategy: free   # all nodes run tasks in parallel — required for cluster bootstrap
  roles:
    - etcd

- name: Deploy q1 cluster
  hosts: q1
  become: yes
  roles:
    - q1
